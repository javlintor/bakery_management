{% extends 'core/_base.html' %}
{% block content %}
  <h1>Panes</h1>
  <div class="page-actions" style="margin-top: 24px;">
    <a href="{% url 'core:crear-pan' %}" class="btn">Añadir nuevo pan</a>
  </div>
  <div class="bread-grid">
    {% for bread in breads %}
      <a href="{% url 'core:pan' bread_id=bread.id %}" class="bread-tile">
        {% include "core/_bread_thumb.html" with bread=bread class="bread-tile-image" %}
        <span class="bread-tile-name">{{ bread.name }}</span>
      </a>
    {% endfor %}
  </div>
{% endblock %}
