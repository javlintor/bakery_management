{% extends 'core/_base.html' %}
{% block content %}
  <h1>Panes</h1>
  <div class="page-actions" style="margin-top: 24px;">
    <a href="{% url 'core:crear-pan' %}" class="btn">Añadir nuevo pan</a>
  </div>
  <ul class="item-list">
    {% for bread in breads %}
      <li>
        <a href="{% url 'core:pan' bread_id=bread.id %}">{{ bread }}</a>
      </li>
    {% endfor %}
  </ul>
{% endblock %}
