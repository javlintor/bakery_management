{% load static %}
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manoli Bakes</title>
    <link rel="icon" type="image/x-icon" href="{% static 'images/logo.webp' %}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'core/style.css' %}" />
  </head>
  <body>
    <header class="nav">
      <a href="{% url 'core:index' %}" class="nav-brand">Manoli Bakes</a>
      <nav class="nav-links">
        <a href="{% url 'core:pedidos' %}" class="nav-link">Pedidos</a>
        <a href="{% url 'core:clientes' %}" class="nav-link">Clientes</a>
        <a href="{% url 'core:panes' %}" class="nav-link">Panes</a>
      </nav>
      {% if user.is_authenticated %}
        <a href="{% url 'members:logout' %}" class="nav-auth">Logout</a>
      {% else %}
        <a href="{% url 'members:login' %}" class="nav-auth">Login</a>
      {% endif %}
    </header>
    <main class="container">
      {% block content %}{% endblock %}
    </main>
    {% if messages %}
      {% for message in messages %}
        <div class="toast">{{ message }}</div>
      {% endfor %}
      <script>
        document.querySelectorAll('.toast').forEach(function(el) {
          setTimeout(function() { el.remove(); }, 2500);
        });
      </script>
    {% endif %}
  </body>
</html>
