{% extends 'core/_base.html' %}
{% block content %}
  <h1>Pedidos</h1>
  <p class="caption">{{ date_long_str }}</p>
  <form action="{% url 'core:pedidos' %}">
    <input type="date" name="date" value="{{ date_iso_str }}" onchange="this.form.submit()" />
  </form>
  <table class="table">
    <thead>
      <tr>
        <th>Tipo de pan</th>
        <th class="col-right">Total</th>
      </tr>
    </thead>
    <tbody>
      {% for order in orders %}
        <tr>
          <th scope="row">{{ order.name }}</th>
          <td class="col-right">{{ order.number }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
